<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<title>Summer Arcade Challenge</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    background: #000;
    font-family: 'Press Start 2P', monospace;
    color: #fff;
    min-height: 100vh;
    padding-bottom: 40px;
    -webkit-font-smoothing: antialiased;
  }

  .scanlines {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.12) 2px,
      rgba(0,0,0,0.12) 4px
    );
    pointer-events: none;
    z-index: 1000;
  }

  .ticker {
    background: #000;
    border-top: 2px solid #ff0;
    border-bottom: 2px solid #ff0;
    padding: 7px 0;
    overflow: hidden;
    white-space: nowrap;
  }

  .ticker-inner {
    display: inline-block;
    animation: ticker 26s linear infinite;
    font-size: 8px;
    color: #ff0;
    letter-spacing: 2px;
  }

  @keyframes ticker {
    0%   { transform: translateX(100vw); }
    100% { transform: translateX(-100%); }
  }

  .header {
    text-align: center;
    padding: 0 0 18px;
    border-bottom: 4px solid #ff0;
    background: #000;
  }

  .header-hero {
    width: 100%;
    display: block;
    max-height: 220px;
    object-fit: cover;
    object-position: center top;
  }

  .header-sub {
    font-size: 7px;
    color: #0ff;
    margin-top: 14px;
    letter-spacing: 1px;
    text-shadow: 0 0 8px #0ff;
  }

  .progress-bar-wrap {
    margin: 14px auto 0;
    max-width: 340px;
    padding: 0 8px;
  }

  .progress-label {
    font-size: 6px;
    color: #0f0;
    margin-bottom: 6px;
    display: flex;
    justify-content: space-between;
  }

  .progress-track {
    height: 14px;
    background: #111;
    border: 2px solid #0f0;
  }

  .progress-fill {
    height: 100%;
    background: #0f0;
    transition: width 0.5s;
    box-shadow: 0 0 8px #0f0;
  }

  /* Single column grid, full width on mobile */
  .grid {
    display: flex;
    flex-direction: column;
    gap: 16px;
    padding: 20px 12px 32px;
    max-width: 520px;
    margin: 0 auto;
  }

  .card {
    background: #0a0010;
    border: 3px solid #800080;
    position: relative;
    width: 100%;
  }

  .card.done {
    border-color: #0f0;
    background: #001400;
  }

  .card-header {
    background: #1a001a;
    padding: 10px 12px 8px;
    border-bottom: 2px solid #800080;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .card.done .card-header {
    background: #002800;
    border-bottom-color: #0f0;
  }

  .game-num {
    font-size: 7px;
    color: #ff0;
    min-width: 28px;
    text-shadow: 0 0 6px #ff0;
  }

  .game-title {
    font-size: 9px;
    color: #fff;
    flex: 1;
    letter-spacing: 0.5px;
    line-height: 1.5;
  }

  .card.done .game-title { color: #0f0; }

  .year-badge {
    font-size: 6px;
    color: #0ff;
    background: #001a1a;
    border: 1px solid #0ff;
    padding: 3px 6px;
  }

  .marquee-area {
    width: 100%;
    height: 110px;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    background: #000;
  }

  .marquee-art {
    width: 100%;
    height: 100%;
  }

  .mission-section {
    padding: 12px 14px;
    border-top: 1px solid #333;
  }

  .mission-label {
    font-size: 6px;
    color: #ff0;
    margin-bottom: 8px;
    letter-spacing: 1px;
  }

  .mission-text {
    font-size: 7px;
    color: #ccc;
    line-height: 2;
    border-left: 3px solid #800080;
    padding-left: 10px;
  }

  .card.done .mission-text { border-left-color: #0f0; color: #0f0; }

  .card-footer {
    padding: 10px 14px 12px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-top: 1px solid #222;
    gap: 10px;
  }

  .complete-btn {
    font-family: 'Press Start 2P', monospace;
    font-size: 7px;
    padding: 10px 14px;
    background: #000;
    border: 2px solid #800080;
    color: #f0f;
    cursor: pointer;
    letter-spacing: 0.5px;
    min-height: 44px;
    touch-action: manipulation;
  }

  .card.done .complete-btn {
    border-color: #0f0;
    color: #0f0;
    font-size: 6px;
  }

  .done-stamp { text-align: right; }

  .done-label {
    font-size: 7px;
    color: #0f0;
    text-shadow: 0 0 8px #0f0;
    display: block;
    line-height: 1.8;
  }

  .done-date {
    font-size: 5px;
    color: #0a0;
    margin-top: 4px;
    display: block;
  }

  .corner-tl, .corner-tr, .corner-bl, .corner-br {
    position: absolute;
    width: 10px;
    height: 10px;
    z-index: 2;
  }
  .corner-tl { top: -1px; left: -1px; border-top: 3px solid #ff0; border-left: 3px solid #ff0; }
  .corner-tr { top: -1px; right: -1px; border-top: 3px solid #ff0; border-right: 3px solid #ff0; }
  .corner-bl { bottom: -1px; left: -1px; border-bottom: 3px solid #ff0; border-left: 3px solid #ff0; }
  .corner-br { bottom: -1px; right: -1px; border-bottom: 3px solid #ff0; border-right: 3px solid #ff0; }
  .card.done .corner-tl, .card.done .corner-tr,
  .card.done .corner-bl, .card.done .corner-br { border-color: #0f0; }

  /* Modal */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.88);
    z-index: 2000;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .modal-overlay.show { display: flex; }

  .modal {
    background: #000;
    border: 4px solid #0f0;
    padding: 28px 22px;
    width: 100%;
    max-width: 360px;
    text-align: center;
  }

  .modal-game-name {
    font-size: 10px;
    color: #ff0;
    margin-bottom: 14px;
    display: block;
    line-height: 1.6;
  }

  .modal h2 {
    font-size: 11px;
    color: #0f0;
    text-shadow: 0 0 15px #0f0;
    margin-bottom: 14px;
    line-height: 1.7;
  }

  .modal p {
    font-size: 7px;
    color: #ccc;
    line-height: 2;
    margin-bottom: 22px;
  }

  .modal-btns {
    display: flex;
    gap: 14px;
    justify-content: center;
  }

  .modal-btn {
    font-family: 'Press Start 2P', monospace;
    font-size: 8px;
    padding: 12px 18px;
    border: 2px solid;
    cursor: pointer;
    background: #000;
    letter-spacing: 0.5px;
    min-height: 44px;
    touch-action: manipulation;
  }

  .modal-btn.yes  { border-color: #0f0; color: #0f0; }
  .modal-btn.yes:active  { background: #0f0; color: #000; }
  .modal-btn.no   { border-color: #f00; color: #f00; }
  .modal-btn.no:active   { background: #f00; color: #fff; }
  .modal-btn.undo { border-color: #f0f; color: #f0f; }
  .modal-btn.undo:active { background: #f0f; color: #000; }

  .blink { animation: blink 1s step-end infinite; }
  @keyframes blink { 50% { opacity: 0; } }
</style>
</head>
<body>
<div class="scanlines"></div>

<div class="ticker">
  <span class="ticker-inner">★ INSERT COIN TO CONTINUE ★ SUMMER ARCADE CHALLENGE ★ 15 MISSIONS ★ HIGH SCORE: YOU ★ INSERT COIN TO CONTINUE ★ SUMMER ARCADE CHALLENGE ★ 15 MISSIONS ★ HIGH SCORE: YOU ★&nbsp;&nbsp;&nbsp;</span>
</div>

<div class="header">
  <img src="header.png" alt="Summer Arcade Challenge '95" class="header-hero">
  <div class="header-sub">COMPLETE 15 LEGENDARY MISSIONS</div>
  <div class="progress-bar-wrap">
    <div class="progress-label">
      <span>MISSIONS COMPLETE</span>
      <span id="prog-count">0 / 15</span>
    </div>
    <div class="progress-track">
      <div class="progress-fill" id="prog-fill" style="width:0%"></div>
    </div>
  </div>
</div>

<div class="grid" id="game-grid"></div>

<div class="modal-overlay" id="modal">
  <div class="modal">
    <span class="modal-game-name" id="modal-game-name"></span>
    <h2 id="modal-heading"></h2>
    <p id="modal-body"></p>
    <div class="modal-btns" id="modal-btns"></div>
  </div>
</div>

const STORAGE_KEY = 'arcade_challenge_v1';

function loadState() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}'); }
  catch { return {}; }
}

function saveState(st) {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(st)); } catch {}
}

let state = loadState();
let pendingId = null;
let pendingAction = null;

function updateProgress() {
  const done = Object.values(state).filter(v => v && v.done).length;
  document.getElementById('prog-count').textContent = done + ' / 15';
  document.getElementById('prog-fill').style.width = (done / 15 * 100) + '%';
}

function renderCard(game) {
  const s = state[game.id] || {};
  const isDone = !!s.done;
  const card = document.createElement('div');
  card.className = 'card' + (isDone ? ' done' : '');
  card.id = 'card-' + game.id;
  card.innerHTML = `
    <div class="corner-tl"></div><div class="corner-tr"></div>
    <div class="corner-bl"></div><div class="corner-br"></div>
    <div class="card-header">
      <span class="game-num">${String(game.id).padStart(2,'0')}</span>
      <span class="game-title">${game.title}</span>
      <span class="year-badge">${game.year}</span>
    </div>
    <div class="marquee-area">${drawMarqueeArt(game.icon)}</div>
    <div class="mission-section">
      <div class="mission-label">★ MISSION ★</div>
      <div class="mission-text">${game.mission}</div>
    </div>
    <div class="card-footer">
      <button class="complete-btn" data-id="${game.id}">${isDone ? '✓ UNDO' : '► COMPLETE'}</button>
      <div class="done-stamp">
        ${isDone ? `<span class="done-label blink">MISSION</span><span class="done-label">ACCOMPLISHED</span><span class="done-date">${s.date}</span>` : ''}
      </div>
    </div>
  `;
  return card;
}

function openModal(id, action) {
  pendingId = id;
  pendingAction = action;
  const game = GAMES.find(g => g.id === id);
  document.getElementById('modal-game-name').textContent = game.title;
  const btns = document.getElementById('modal-btns');
  if (action === 'complete') {
    document.getElementById('modal-heading').textContent = 'MISSION ACCOMPLISHED?';
    document.getElementById('modal-body').textContent = 'Mark "' + game.title + '" as complete?';
    btns.innerHTML = `<button class="modal-btn yes" id="m-yes">► YES!</button><button class="modal-btn no" id="m-no">✕ NO</button>`;
  } else {
    document.getElementById('modal-heading').textContent = 'UNDO COMPLETION?';
    document.getElementById('modal-body').textContent = 'Remove completion for "' + game.title + '"?';
    btns.innerHTML = `<button class="modal-btn undo" id="m-yes">► UNDO</button><button class="modal-btn no" id="m-no">✕ CANCEL</button>`;
  }
  document.getElementById('modal').classList.add('show');
  document.getElementById('m-yes').onclick = confirmAction;
  document.getElementById('m-no').onclick = closeModal;
}

function closeModal() {
  document.getElementById('modal').classList.remove('show');
  pendingId = null; pendingAction = null;
}

function confirmAction() {
  if (pendingAction === 'complete') {
    const d = new Date();
    state[pendingId] = { done: true, date: d.toLocaleDateString('en-US', {month:'short', day:'numeric', year:'numeric'}) };
  } else {
    delete state[pendingId];
  }
  saveState(state);
  const game = GAMES.find(g => g.id === pendingId);
  const grid = document.getElementById('game-grid');
  const old = document.getElementById('card-' + pendingId);
  grid.replaceChild(renderCard(game), old);
  updateProgress();
  closeModal();
}

document.getElementById('modal').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

function init() {
  const grid = document.getElementById('game-grid');
  GAMES.forEach(g => grid.appendChild(renderCard(g)));
  grid.addEventListener('click', function(e) {
    const btn = e.target.closest('.complete-btn');
    if (!btn) return;
    const id = parseInt(btn.dataset.id);
    openModal(id, (state[id] && state[id].done) ? 'undo' : 'complete');
  });
  updateProgress();
}

init();
</script>
